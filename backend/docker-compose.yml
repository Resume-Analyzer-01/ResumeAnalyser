version: '3.8'

services:
  app:
    build: .
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/resume-analyzer
      - JWT_ACCESS_SECRET=docker_secret_access_key_xyz_777
      - JWT_REFRESH_SECRET=docker_secret_refresh_key_xyz_777
      - AI_PROVIDER=mock
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data:
